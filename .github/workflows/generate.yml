name: Generate content page

on:
  schedule:
    - cron: "0 6 * * 1,4" # Mondays and Thursdays 06:00 UTC
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Generate next page from keywords.txt
        run: npm run generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # Non-blocking second check on the generated page; the report lands in
      # the PR body below. The report is written to RUNNER_TEMP so it is never
      # picked up by the PR commit. generate.mjs remains the blocking
      # validator at generation time.
      - name: Compliance check (non-blocking)
        id: compliance
        continue-on-error: true
        run: |
          node scripts/compliance-check.mjs > "$RUNNER_TEMP/compliance.md" \
            || echo "**Compliance check:** checker crashed — see the run log." > "$RUNNER_TEMP/compliance.md"
          cat "$RUNNER_TEMP/compliance.md"
          cat "$RUNNER_TEMP/compliance.md" >> "$GITHUB_STEP_SUMMARY"
          {
            echo 'summary<<COMPLIANCE_EOF'
            cat "$RUNNER_TEMP/compliance.md"
            echo 'COMPLIANCE_EOF'
          } >> "$GITHUB_OUTPUT"

      # Changes land via PR for human review — never pushed to main directly.
      - name: Open pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: content/generated-page
          delete-branch: true
          commit-message: "Add generated content page from keywords.txt"
          title: "Content draft: next page from keywords.txt"
          body: |
            Automated content draft generated by `scripts/generate.mjs`.

            ${{ steps.compliance.outputs.summary }}

            Review checklist before merging:
            - [ ] Facts are accurate; unconfirmed GTA 6 details are labeled as such
            - [ ] No fabricated prices, star ratings, or product links
            - [ ] Title/meta/canonical/JSON-LD follow CLAUDE.md
            - [ ] Affiliate links use `tag=vicereport-21` with `rel="sponsored nofollow noopener"`
